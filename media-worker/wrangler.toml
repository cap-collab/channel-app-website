name = "media-cdn"
main = "src/index.ts"
compatibility_date = "2024-09-25"

# Bind to the R2 bucket
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "channel-broadcast"

# Route: intercept all requests to media.channel-app.com
[env.production]
routes = [
  { pattern = "media.channel-app.com/*", zone_name = "channel-app.com" }
]

[[env.production.r2_buckets]]
binding = "BUCKET"
bucket_name = "channel-broadcast"
